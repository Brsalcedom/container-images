name: "Docker :: Security Scan"

on:
  pull_request:
    paths:
      - 'images/**'
      - '.github/workflows/docker-security-scan.yml'
  workflow_dispatch:
    inputs:
      image:
        type: choice
        required: true
        description: "Image to scan"
        options:
          - "homelab-ci"

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  TOFU_VERSION: "1.10.3"

jobs:
  scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image to scan
        id: image
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "IMAGE=${{ inputs.image }}" >> $GITHUB_OUTPUT
          else
            # Detectar qué imagen cambió en el PR
            CHANGED_IMAGES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep '^images/' | cut -d'/' -f2 | sort -u)
            if [ -z "$CHANGED_IMAGES" ]; then
              echo "No image changes detected"
              echo "IMAGE=" >> $GITHUB_OUTPUT
            else
              # Si hay múltiples imágenes, tomar la primera
              IMAGE=$(echo "$CHANGED_IMAGES" | head -n1)
              echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check if image was detected
        id: check
        run: |
          if [ -z "${{ steps.image.outputs.IMAGE }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No image to scan, skipping..."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Scanning image: ${{ steps.image.outputs.IMAGE }}"
          fi

      - name: Build image for scanning
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/${{ steps.image.outputs.IMAGE }}/Dockerfile
          load: true
          build-args: |
            TOFU_VERSION=${{ env.TOFU_VERSION }}
            VERSION=scan-test
          tags: |
            scan-target:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        if: steps.check.outputs.skip == 'false'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy with table output
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Check for CRITICAL vulnerabilities
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target:latest'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL'
          exit-code: '0'  # No fallar, solo reportar
        id: critical-check

      - name: Count CRITICAL vulnerabilities
        if: steps.check.outputs.skip == 'false'
        id: count-vulns
        run: |
          if [ -f trivy-results.json ]; then
            CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
            echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
            echo "Found $CRITICAL_COUNT CRITICAL vulnerabilities"
          else
            echo "critical_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate SBOM
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target:latest'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ steps.image.outputs.IMAGE }}
          path: sbom.json
          retention-days: 7

      - name: Generate scan summary
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "## 🔍 Trivy Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.image.outputs.IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f trivy-results.json ]; then
            # Parse JSON results
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)
            
            echo "### Vulnerability Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$CRITICAL" -gt 0 ]; then
              echo "### ⚠️ CRITICAL Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**This build should NOT be merged until critical vulnerabilities are resolved.**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              # List first 5 critical vulnerabilities
              jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") | "- **\(.VulnerabilityID)**: \(.Title // "N/A")\n  - Package: `\(.PkgName)@\(.InstalledVersion)`\n  - Fixed in: `\(.FixedVersion // "N/A")`\n"' trivy-results.json | head -n 20 >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ No Critical Vulnerabilities" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "The image passed the security scan with no critical issues." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ✅ Clean Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No vulnerabilities detected." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Full results available in the [Security tab](../security/code-scanning)." >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with scan results
        if: github.event_name == 'pull_request' && steps.check.outputs.skip == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
            
            let comment = '## 🔍 Trivy Security Scan Results\n\n';
            comment += `**Image:** \`${{ steps.image.outputs.IMAGE }}\`\n\n`;
            
            if (results.Results && results.Results.length > 0) {
              const vulns = results.Results[0].Vulnerabilities || [];
              const critical = vulns.filter(v => v.Severity === 'CRITICAL').length;
              const high = vulns.filter(v => v.Severity === 'HIGH').length;
              const medium = vulns.filter(v => v.Severity === 'MEDIUM').length;
              
              comment += '### Vulnerability Summary\n\n';
              comment += `| Severity | Count |\n`;
              comment += `|----------|-------|\n`;
              comment += `| 🔴 CRITICAL | ${critical} |\n`;
              comment += `| 🟠 HIGH | ${high} |\n`;
              comment += `| 🟡 MEDIUM | ${medium} |\n\n`;
              
              if (critical > 0) {
                comment += '### ⚠️ CRITICAL Vulnerabilities Found\n\n';
                comment += '**This build should NOT be merged until critical vulnerabilities are resolved.**\n\n';
                vulns.filter(v => v.Severity === 'CRITICAL').slice(0, 5).forEach(v => {
                  comment += `- **${v.VulnerabilityID}**: ${v.Title || 'N/A'}\n`;
                  comment += `  - Package: \`${v.PkgName}@${v.InstalledVersion}\`\n`;
                  if (v.FixedVersion) {
                    comment += `  - Fixed in: \`${v.FixedVersion}\`\n`;
                  }
                  comment += '\n';
                });
              } else {
                comment += '### ✅ No Critical Vulnerabilities\n\n';
                comment += 'The image passed the security scan with no critical issues.\n';
              }
            } else {
              comment += '### ✅ Clean Scan\n\nNo vulnerabilities detected.\n';
            }
            
            comment += '\n---\n';
            comment += 'Full results available in the [Security tab](../security/code-scanning).\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if CRITICAL vulnerabilities found
        if: steps.check.outputs.skip == 'false' && steps.count-vulns.outputs.critical_count != '0'
        run: |
          echo "::error title=Security Scan Failed::CRITICAL vulnerabilities detected in ${{ steps.image.outputs.IMAGE }}"
          echo ""
          echo "❌ CRITICAL vulnerabilities detected!"
          echo "This PR cannot be merged until vulnerabilities are resolved."
          echo ""
          echo "📊 Check the workflow summary above for detailed vulnerability information."
          echo ""
          echo "🔧 Options to fix:"
          echo "1. Update base image to a newer version (e.g., alpine:3.22 → alpine:3.23)"
          echo "2. Update vulnerable packages in Dockerfile"
          echo "3. Apply security patches"
          echo "4. Review the Security tab for detailed CVE information"
          echo ""
          echo "See the scan results above for details."
          exit 1
